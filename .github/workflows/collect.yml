name: Collect A-share market data

on:
  push:
    branches: [main]
    paths:
      - "collector_cloud.py"
      - "config.json"
      - "requirements.txt"
      - "public/data/wencai_sector_overrides.json"
      - "public/data/wencai_enrichment.part*.b64"
      - ".github/workflows/collect.yml"
  workflow_dispatch:
    inputs:
      refresh_history:
        description: Refresh BaoStock technical history
        required: false
        default: true
        type: boolean
      refresh_sectors:
        description: Refresh full-market industry mapping
        required: false
        default: false
        type: boolean
  schedule:
    # China trading days. Intraday snapshots run about every 15 minutes.
    - cron: "22 9 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "37,52 9 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "7,22,37,52 10 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "7,22 11 * * 1-5"
      timezone: "Asia/Shanghai"
    - cron: "7,22,37,52 13-14 * * 1-5"
      timezone: "Asia/Shanghai"
    # Post-close run also refreshes BaoStock technical history.
    - cron: "12 15 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: market-data-collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect and score
        id: collect
        continue-on-error: true
        timeout-minutes: 20
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_REFRESH_HISTORY: ${{ github.event.inputs.refresh_history }}
          MANUAL_REFRESH_SECTORS: ${{ github.event.inputs.refresh_sectors }}
        run: |
          ARGS=""
          if [ "$MANUAL_REFRESH_HISTORY" = "true" ] || [ "$EVENT_SCHEDULE" = "12 15 * * 1-5" ]; then
            ARGS="$ARGS --refresh-history"
          fi
          if [ "$MANUAL_REFRESH_SECTORS" = "true" ]; then
            ARGS="$ARGS --refresh-sectors"
          fi
          echo "Collector schedule: ${EVENT_SCHEDULE:-manual-or-push}; args: ${ARGS:-none}"
          python collector_cloud.py $ARGS
      - name: Publish latest snapshots
        if: always()
        run: |
          git config user.name "ai-trading-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: refresh market snapshot"
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push origin HEAD:main; then
                exit 0
              fi
              git rebase --abort || true
              echo "Publish attempt $attempt failed; retrying against latest main"
              sleep $((attempt * 3))
            done
            echo "Unable to publish snapshots after 3 attempts"
            exit 1
          fi
      - name: Mark unusable collection as failed
        if: steps.collect.outcome == 'failure'
        run: |
          echo "No fresh full-market snapshot was collected. Previous valid data was preserved."
          exit 1
